services:
  postgres:
    image: postgres:16
    container_name: marketpulse-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: marketpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"    



volumes:
  pgdata: